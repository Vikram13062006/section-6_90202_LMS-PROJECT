# Active profile defaults to h2 for local development.
# Use APP_PROFILE=mysql to run against MySQL.
spring.profiles.active=${APP_PROFILE:h2}

spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
server.port=8081

spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB

jwt.secret=ChangeMeChangeMeChangeMeChangeMeChangeMeChangeMe
jwt.expiration-ms=86400000
app.upload-dir=backend/uploads

spring.jackson.serialization.write-dates-as-timestamps=false