# Active profile defaults to h2 for local development.
# Set APP_PROFILE=mysql (or pass -Dspring-boot.run.profiles=mysql) to use MySQL.
spring.profiles.active=${APP_PROFILE:h2}

# Hibernate / JPA (common)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Server port
server.port=8081

# File upload settings
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.upload-dir=backend/uploads

# JWT settings
jwt.secret=ChangeMeChangeMeChangeMeChangeMeChangeMe
jwt.expiration-ms=86400000

# Jackson settings
spring.jackson.serialization.write-dates-as-timestamps=false

# CORS settings (comma-separated origin patterns)
app.cors.allowed-origin-patterns=${APP_CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:5173,http://127.0.0.1:5173,https://*.netlify.app}