# Active profile for MySQL
spring.profiles.active=mysql

# MySQL Datasource
spring.datasource.url=jdbc:mysql://localhost:3306/lms_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=1313
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Hibernate / JPA
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.MySQL8Dialect

# Server port
server.port=8081

# File upload settings
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.upload-dir=backend/uploads

# JWT settings
jwt.secret=ChangeMeChangeMeChangeMeChangeMeChangeMe
jwt.expiration-ms=86400000

# Jackson settings
spring.jackson.serialization.write-dates-as-timestamps=false